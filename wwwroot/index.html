<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SSE Notification Center</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }

        .notification-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            z-index: 9999;
        }

        .notification {
            animation: slideIn .4s ease;
            margin-bottom: 15px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>


<body>


<div class="container py-5">

    <div class="card shadow border-0">

        <div class="card-body p-5 text-center">

            <h1 class="mb-3">
                🔔 SSE Notification Center
            </h1>

            <p class="text-muted">
                Select a user and receive real-time notifications
            </p>

            <span id="status"
                  class="badge rounded-pill bg-secondary px-4 py-2">
                Not connected
            </span>

        </div>

    </div>

</div>


<!-- Notification Area -->
<div id="notificationContainer"
     class="notification-container">
</div>



<!-- User Selection Modal -->
<div class="modal fade"
     id="userModal"
     tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content shadow">

            <div class="modal-header">

                <h5 class="modal-title">
                    👤 Choose User
                </h5>

            </div>


            <div class="modal-body">

                <div id="userList"
                     class="list-group">
                </div>

            </div>

        </div>

    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>


<script>

    const API_URL = "http://localhost:5171";


    const colors = [
        "primary",
        "success",
        "danger",
        "warning",
        "info",
        "dark"
    ];


    let eventSource = null;


    const statusElement =
        document.getElementById("status");


    const notificationContainer =
        document.getElementById(
            "notificationContainer"
        );


    const userList =
        document.getElementById(
            "userList"
        );


    const userModal =
        new bootstrap.Modal(
            document.getElementById(
                "userModal"
            )
        );



    loadUsers();



    async function loadUsers()
    {
        const response =
            await fetch(
                `${API_URL}/users`
            );


        const users =
            await response.json();


        users.forEach(user =>
        {
            const item =
                document.createElement(
                    "button"
                );


            item.className =
                `
            list-group-item
            list-group-item-action
            d-flex
            justify-content-between
            align-items-center
            p-3
            `;


            item.innerHTML =
                `
            <div>
                <div class="fw-bold">
                    ${user.userName}
                </div>

                <small class="text-muted">
                    User ID: ${user.id}
                </small>
            </div>

            <span class="badge bg-primary rounded-pill">
                Connect
            </span>
            `;


            item.onclick = () =>
            {
                userModal.hide();

                connect(
                    user.id,
                    user.userName
                );
            };


            userList.appendChild(item);
        });


        userModal.show();
    }



    function connect(userId, userName)
    {
        eventSource?.close();


        eventSource =
            new EventSource(
                `${API_URL}/notifications/event/${userId}`
            );


        eventSource.onopen = () =>
        {
            statusElement.className =
                "badge rounded-pill bg-success px-4 py-2";


            statusElement.innerHTML =
                `🟢 Connected: ${userName}`;
        };


        eventSource.onmessage = event =>
        {
            showNotification(
                event.data
            );
        };


        eventSource.onerror = () =>
        {
            statusElement.className =
                "badge rounded-pill bg-danger px-4 py-2";


            statusElement.innerHTML =
                "🔴 Disconnected";
        };
    }



    function showNotification(message)
    {
        const color =
            colors[
                Math.floor(
                    Math.random() *
                    colors.length
                )
                ];


        const alert =
            document.createElement(
                "div"
            );


        alert.className =
            `
        alert
        alert-${color}
        alert-dismissible
        fade
        show
        shadow
        notification
        `;


        alert.innerHTML =
            `
        <div class="fw-bold">
            🔔 New Notification
        </div>

        <hr>

        <div>
            ${message}
        </div>


        <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert">
        </button>
        `;


        notificationContainer.appendChild(alert);


        setTimeout(() =>
        {
            bootstrap.Alert
                .getOrCreateInstance(alert)
                .close();

        }, 5000);
    }

</script>


</body>
</html>
